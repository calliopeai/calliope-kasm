name: Update Copyright Year

on:
  schedule:
    - cron: '0 0 1 1 *'  # Jan 1st at midnight UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write

jobs:
  update-copyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update copyright year
        run: |
          CURRENT_YEAR=$(date +%Y)
          # Match "2025–YYYY" pattern and update end year
          find . -name '*.md' -not -path './node_modules/*' | xargs sed -i "s/2025–[0-9]\{4\} Calliope Labs/2025–${CURRENT_YEAR} Calliope Labs/g"

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes needed"
          else
            git add -A
            git commit -m "Update copyright year to $(date +%Y)"
            git push
          fi
